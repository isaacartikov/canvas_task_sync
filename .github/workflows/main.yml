name: Canvas Task Sync

on:
  schedule:
    #"Cron" format. 
    # 13:00 UTC (8:00 local time if you are in the US Eastern Time Zone, but adjust as necessary for your local time zone)
    - cron: '0 13 * * *'
    # 22:00 UTC (17:00 local time if you are in the US Eastern Time Zone, but adjust as necessary for your local time zone)
    - cron: '0 22 * * *'

  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          # This maps your GitHub Secrets to the script
          INSTITUTION_ONE_NAME: ${{ secrets.INSTITUTION_ONE_NAME }}
          INSTITUTION_ONE_TOKEN: ${{ secrets.INSTITUTION_ONE_TOKEN }}
          INSTITUTION_ONE_URL: ${{ secrets.INSTITUTION_ONE_URL }}
          INSTITUTION_TWO_NAME: ${{ secrets.INSTITUTION_TWO_NAME }}
          INSTITUTION_TWO_TOKEN: ${{ secrets.INSTITUTION_TWO_TOKEN }}
          INSTITUTION_TWO_URL: ${{ secrets.INSTITUTION_TWO_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          LOCAL_TIMEZONE: ${{ secrets.LOCAL_TIMEZONE }}
          EMAIL_REMINDER_TIME: ${{ secrets.EMAIL_REMINDER_TIME }}
          DISCORD_REMINDER_TIME: ${{ secrets.DISCORD_REMINDER_TIME }}
        run: python main.py